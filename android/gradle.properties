org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# ==============================
# Cache / download location
# ==============================
# Paling efektif untuk mengarahkan cache dependency Gradle adalah lewat GRADLE_USER_HOME
# (lihat D_CACHE_SETUP.md).
# Baris ini hanya tambahan untuk kompatibilitas.
org.gradle.caching=true
org.gradle.parallel=true

# ==============================
# Mitigation for Kotlin daemon incremental-cache close error:
# "Storage ... is already registered" / "Could not close incremental caches ..."
# Disabling Kotlin incremental compilation avoids corrupted incremental caches.
kotlin.incremental=false



