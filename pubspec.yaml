name: scolix_mobile
description: Aplikasi mobile Scolix AI
publish_to: "none"

version: 1.0.1+6

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.2.0

  camera: ^0.11.0+2
  image: ^4.1.7
  google_mlkit_pose_detection: ^0.13.0

  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_storage: ^12.1.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.3.0

  shared_preferences: ^2.2.3

  pdf: ^3.11.0
  printing: ^5.13.0

  fl_chart: ^0.68.0

  url_launcher: ^6.2.6
  http: ^1.2.2
  google_mobile_ads: ^8.0.0

  permission_handler: ^11.3.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/